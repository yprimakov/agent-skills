<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-primary: #07090f;
      --bg-secondary: #0d1117;
      --bg-card: #111827;
      --bg-card-hover: #1a2335;
      --border: rgba(255,255,255,0.06);
      --border-accent: rgba(201,168,76,0.25);
      --gold: #c9a84c;
      --gold-light: #e8c87a;
      --gold-dim: rgba(201,168,76,0.1);
      --blue: #4a9eff;
      --blue-dim: rgba(74,158,255,0.1);
      --green: #00c896;
      --green-dim: rgba(0,200,150,0.1);
      --red: #ff4d6a;
      --red-dim: rgba(255,77,106,0.1);
      --amber: #f5a623;
      --amber-dim: rgba(245,166,35,0.12);
      --text-primary: #e2e8f0;
      --text-secondary: #7a8899;
      --text-muted: #3d4a5c;
      --font-display: 'Playfair Display', serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-primary);
      background-image:
        linear-gradient(rgba(201,168,76,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      border-bottom: 1px solid var(--border-accent);
      background: rgba(7,9,15,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .gs-logo {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .top-bar-divider {
      width: 1px;
      height: 16px;
      background: var(--border-accent);
    }
    .top-bar-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      text-transform: uppercase;
    }
    .top-bar-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ── HERO ── */
    .hero {
      padding: 60px 40px 48px;
      border-bottom: 1px solid var(--border);
      animation: fadeSlideUp 0.6s ease both;
    }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .hero-subtitle {
      font-family: var(--font-display);
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 400;
      font-style: italic;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }
    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .badge-gold { background: var(--gold-dim); border: 1px solid var(--border-accent); color: var(--gold-light); }
    .badge-blue { background: var(--blue-dim); border: 1px solid rgba(74,158,255,0.2); color: var(--blue); }
    .badge-sector { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-secondary); }

    /* ── METRICS STRIP ── */
    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid var(--border);
      animation: fadeSlideUp 0.6s ease 0.1s both;
    }
    .metric-cell {
      padding: 24px 28px;
      border-right: 1px solid var(--border);
    }
    .metric-cell:last-child { border-right: none; }
    .metric-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .metric-value {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 4px;
    }
    .metric-sub {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--text-secondary);
    }
    .metric-value.gold { color: var(--gold); }
    .metric-value.green { color: var(--green); }
    .metric-value.red { color: var(--red); }

    /* ── SECTION ── */
    .section {
      padding: 48px 40px;
      border-bottom: 1px solid var(--border);
    }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 32px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .section-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── CHARTS ROW ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1.6fr;
      gap: 20px;
      animation: fadeSlideUp 0.6s ease 0.2s both;
    }
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold);
      border-radius: 4px;
      padding: 24px;
    }
    .chart-card-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .chart-wrap {
      position: relative;
    }
    .chart-wrap.donut { height: 200px; }
    .chart-wrap.bar-h { height: 300px; }
    .chart-wrap.bar-g { height: 300px; }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      animation: fadeSlideUp 0.6s ease 0.3s both;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-accent);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }
    thead th:hover { color: var(--gold); }
    thead th.sorted { color: var(--gold-light); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:hover { background: var(--bg-card-hover); }
    tbody td {
      padding: 12px 14px;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .ticker-cell {
      font-weight: 600;
      color: var(--gold-light);
    }
    .moat-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 500;
    }
    .moat-strong { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,200,150,0.2); }
    .moat-moderate { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
    .moat-weak { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,77,106,0.2); }
    .risk-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 20px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
    }
    .risk-low { background: var(--green-dim); color: var(--green); }
    .risk-mid { background: var(--amber-dim); color: var(--amber); }
    .risk-high { background: var(--red-dim); color: var(--red); }
    .bull { color: var(--green); }
    .bear { color: var(--red); }
    .pct-pos { color: var(--green); }
    .entry-zone { color: var(--blue); }

    /* ── STOCK CARDS ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .stock-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold);
      border-radius: 4px;
      padding: 24px;
      opacity: 0;
      animation: fadeSlideUp 0.5s ease both;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-ticker {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--gold-light);
      line-height: 1;
      margin-bottom: 4px;
    }
    .card-company {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text-secondary);
    }
    .card-sector-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 3px 8px;
      background: var(--blue-dim);
      border: 1px solid rgba(74,158,255,0.15);
      color: var(--blue);
      border-radius: 2px;
      white-space: nowrap;
    }
    .card-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .card-metric {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 12px;
    }
    .card-metric-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .card-metric-value {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .card-targets {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .target-block {
      flex: 1;
      padding: 10px 14px;
      border-radius: 3px;
    }
    .target-bull { background: var(--green-dim); border: 1px solid rgba(0,200,150,0.15); }
    .target-bear { background: var(--red-dim); border: 1px solid rgba(255,77,106,0.15); }
    .target-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .target-bull .target-label { color: rgba(0,200,150,0.7); }
    .target-bear .target-label { color: rgba(255,77,106,0.7); }
    .target-price {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 600;
    }
    .target-bull .target-price { color: var(--green); }
    .target-bear .target-price { color: var(--red); }
    .card-risk-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .risk-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .risk-bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .risk-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s ease;
    }
    .risk-bar-score {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      min-width: 36px;
      text-align: right;
    }
    .card-entry-box {
      display: flex;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 3px;
    }
    .entry-item { text-align: center; }
    .entry-item-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .entry-item-value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
    }
    .entry-item-value.entry { color: var(--blue); }
    .entry-item-value.stop { color: var(--red); }
    .entry-item-value.alloc { color: var(--gold); }

    /* ── PORTFOLIO TABLE ── */
    .portfolio-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-sans);
      animation: fadeSlideUp 0.6s ease 0.4s both;
    }
    .portfolio-table th {
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-accent);
      text-align: left;
    }
    .portfolio-table td {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .alloc-tier {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
    }
    .alloc-core { color: var(--gold); }
    .alloc-growth { color: var(--blue); }
    .alloc-speculative { color: var(--red); }
    .alloc-tickers {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .alloc-ticker-chip {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-primary);
    }
    .alloc-weight {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ── FOOTER ── */
    .footer {
      padding: 32px 40px;
      border-top: 1px solid var(--border-accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-disclaimer {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.5;
    }
    .footer-brand {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: right;
    }
    .footer-brand span {
      display: block;
      color: var(--gold);
      font-size: 11px;
      margin-bottom: 2px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .metrics-strip { grid-template-columns: repeat(3, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>

/* ════════════════════
   HELPERS
   ════════════════════ */
function riskColor(score) {
  if (score <= 4) return 'var(--green)';
  if (score <= 7) return 'var(--amber)';
  return 'var(--red)';
}
function riskClass(score) {
  if (score <= 4) return 'risk-low';
  if (score <= 7) return 'risk-mid';
  return 'risk-high';
}
function moatClass(moat) {
  return { Strong: 'moat-strong', Moderate: 'moat-moderate', Weak: 'moat-weak' }[moat] || 'moat-moderate';
}
function formatPrice(p) {
  if (p >= 1) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return '$' + p.toFixed(2);
}
function avgRisk() {
  return (REPORT_DATA.stocks.reduce((s, st) => s + st.riskScore, 0) / REPORT_DATA.stocks.length).toFixed(1);
}
function topPick() {
  const s = [...REPORT_DATA.stocks].sort((a, b) => {
    const upsideA = (a.bullTarget - a.bearTarget) / a.bearTarget;
    const upsideB = (b.bullTarget - b.bearTarget) / b.bearTarget;
    return upsideB - upsideA;
  });
  return s[0].ticker;
}
function avgPE() {
  const valid = REPORT_DATA.stocks.filter(s => s.pe !== 'N/M');
  if (!valid.length) return 'N/M';
  const avg = valid.reduce((sum, s) => sum + parseFloat(s.pe), 0) / valid.length;
  return avg.toFixed(0) + 'x';
}
function highestUpside() {
  const s = [...REPORT_DATA.stocks].sort((a, b) => {
    const ua = ((a.bullTarget / a.bearTarget) - 1) * 100;
    const ub = ((b.bullTarget / b.bearTarget) - 1) * 100;
    return ub - ua;
  });
  const pct = (((s[0].bullTarget / s[0].bearTarget) - 1) * 100).toFixed(0);
  return '+' + pct + '%';
}

/* ════════════════════
   TABLE SORT
   ════════════════════ */
function initTableSort() {
  const table = document.getElementById('summaryTable');
  if (!table) return;
  const headers = table.querySelectorAll('thead th');
  let sortCol = -1, sortAsc = true;

  headers.forEach((th, idx) => {
    th.addEventListener('click', () => {
      if (sortCol === idx) sortAsc = !sortAsc;
      else { sortCol = idx; sortAsc = true; }
      headers.forEach(h => h.classList.remove('sorted'));
      th.classList.add('sorted');

      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const aText = a.cells[idx].textContent.replace(/[$,%x\/]/g, '').trim();
        const bText = b.cells[idx].textContent.replace(/[$,%x\/]/g, '').trim();
        const aNum = parseFloat(aText), bNum = parseFloat(bText);
        const isNum = !isNaN(aNum) && !isNaN(bNum);
        const cmp = isNum ? aNum - bNum : aText.localeCompare(bText);
        return sortAsc ? cmp : -cmp;
      });
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}
