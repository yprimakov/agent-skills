<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iMadeFire | Stock Screening Report | 2026-03-15</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:          #0b0d1a;
      --bg-surface:  #111327;
      --bg-card:     #161930;
      --bg-card-h:   #1c2040;
      --bg-input:    #0e1022;

      --indigo:      #6366f1;
      --indigo-dim:  rgba(99,102,241,0.12);
      --indigo-glow: rgba(99,102,241,0.25);
      --violet:      #8b5cf6;
      --violet-dim:  rgba(139,92,246,0.12);

      --green:       #22c55e;
      --green-dim:   rgba(34,197,94,0.12);
      --red:         #f43f5e;
      --red-dim:     rgba(244,63,94,0.12);
      --amber:       #f59e0b;
      --amber-dim:   rgba(245,158,11,0.12);
      --sky:         #38bdf8;
      --sky-dim:     rgba(56,189,248,0.12);

      --border:      rgba(255,255,255,0.07);
      --border-v:    rgba(99,102,241,0.18);

      --t1: #f1f5f9;
      --t2: #94a3b8;
      --t3: #475569;

      --r: 12px;
      --r-sm: 8px;
      --r-xs: 6px;

      --font: 'Plus Jakarta Sans', sans-serif;
      --mono: 'IBM Plex Mono', monospace;

      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-v: 0 4px 24px rgba(99,102,241,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.12) 0%, transparent 60%);
      color: var(--t1);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      background: rgba(11,13,26,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
      box-shadow: var(--shadow-v);
    }
    .brand-name {
      font-size: 15px; font-weight: 700; color: var(--t1); letter-spacing: -0.02em;
    }
    .topbar-center {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 10px; padding: 7px 14px; width: 280px;
      color: var(--t3); font-size: 13px;
    }
    .topbar-center svg { flex-shrink: 0; }
    .topbar-right {
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-pill {
      font-family: var(--mono); font-size: 11px; color: var(--t2);
      padding: 4px 10px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px;
    }
    .topbar-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: 2px solid var(--border-v);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
    }

    /* ── LAYOUT ── */
    .page { max-width: 1280px; margin: 0 auto; padding: 32px 32px 64px; }

    /* ── HERO ── */
    .hero {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 28px;
      animation: up 0.5s ease both;
    }
    .hero-left {}
    .hero-eyebrow {
      font-size: 12px; font-weight: 600; color: var(--indigo);
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px;
    }
    .hero-title {
      font-size: 28px; font-weight: 800; letter-spacing: -0.03em;
      color: var(--t1); line-height: 1.2; margin-bottom: 4px;
    }
    .hero-sub {
      font-size: 14px; color: var(--t2); margin-bottom: 16px;
    }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: var(--r-xs);
      font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
    }
    .badge-v   { background: var(--indigo-dim); border: 1px solid var(--border-v); color: #a5b4fc; }
    .badge-g   { background: var(--green-dim);  border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
    .badge-sky { background: var(--sky-dim);    border: 1px solid rgba(56,189,248,0.2); color: var(--sky); }
    .hero-right {
      text-align: right; flex-shrink: 0;
    }
    .hero-date {
      font-family: var(--mono); font-size: 12px; color: var(--t3); margin-bottom: 4px;
    }
    .time-filter {
      display: inline-flex; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-sm); overflow: hidden;
    }
    .time-btn {
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      color: var(--t3); border: none; background: transparent;
      transition: all 0.15s;
    }
    .time-btn.active {
      background: var(--indigo); color: #fff;
    }

    /* ── METRICS STRIP ── */
    .metrics-strip {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;
      margin-bottom: 24px;
      animation: up 0.5s 0.05s ease both;
    }
    .metric-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .metric-card:hover { border-color: var(--border-v); box-shadow: var(--shadow-v); }
    .metric-label {
      font-size: 11px; font-weight: 600; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
    }
    .metric-value {
      font-family: var(--mono); font-size: 24px; font-weight: 600;
      color: var(--t1); line-height: 1; margin-bottom: 4px;
    }
    .metric-value.v-indigo { color: var(--indigo); }
    .metric-value.v-green  { color: var(--green); }
    .metric-value.v-red    { color: var(--red); }
    .metric-value.v-amber  { color: var(--amber); }
    .metric-sub { font-size: 11px; color: var(--t3); }
    .metric-trend {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 600; margin-top: 4px;
      padding: 2px 7px; border-radius: 4px;
    }
    .trend-up   { background: var(--green-dim); color: var(--green); }
    .trend-down { background: var(--red-dim);   color: var(--red); }

    /* ── SECTION ── */
    .section { margin-bottom: 24px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 16px; font-weight: 700; letter-spacing: -0.02em; color: var(--t1);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: ''; display: block; width: 3px; height: 18px;
      background: linear-gradient(to bottom, var(--indigo), var(--violet));
      border-radius: 2px;
    }
    .section-meta { font-size: 12px; color: var(--t3); }

    /* ── CHARTS ROW ── */
    .charts-row {
      display: grid; grid-template-columns: 1fr 1.5fr 1.5fr; gap: 16px;
      animation: up 0.5s 0.1s ease both;
    }
    .chart-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px;
      transition: border-color 0.2s;
    }
    .chart-card:hover { border-color: var(--border-v); }
    .chart-label {
      font-size: 11px; font-weight: 700; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .chart-label-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--indigo); display: inline-block;
    }
    canvas { max-width: 100%; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      animation: up 0.5s 0.15s ease both;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 12px 16px;
      font-size: 11px; font-weight: 700; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.08em;
      background: var(--bg-surface); border-bottom: 1px solid var(--border);
      white-space: nowrap; cursor: pointer; user-select: none;
      transition: color 0.15s;
    }
    thead th:hover { color: var(--indigo); }
    thead th.sorted { color: var(--indigo); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-card-h); }
    tbody td { padding: 13px 16px; white-space: nowrap; }

    .td-ticker {
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      color: #a5b4fc;
    }
    .td-sector { font-size: 12px; color: var(--t2); }
    .td-num { font-family: var(--mono); font-size: 12px; color: var(--t1); }
    .td-green { font-family: var(--mono); font-size: 12px; color: var(--green); font-weight: 500; }
    .td-red   { font-family: var(--mono); font-size: 12px; color: var(--red); }
    .td-blue  { font-family: var(--mono); font-size: 12px; color: var(--sky); }

    .moat-pill {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 5px;
      font-size: 11px; font-weight: 600;
    }
    .moat-strong   { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .moat-moderate { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .moat-weak     { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(244,63,94,0.2); }

    .risk-chip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 22px; border-radius: 5px;
      font-family: var(--mono); font-size: 12px; font-weight: 700;
    }
    .risk-lo { background: var(--green-dim); color: var(--green); }
    .risk-md { background: var(--amber-dim); color: var(--amber); }
    .risk-hi { background: var(--red-dim);   color: var(--red); }

    /* ── STOCK CARDS ── */
    .cards-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
    }
    .stock-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px;
      opacity: 0; animation: up 0.45s ease both;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .stock-card:hover { border-color: var(--border-v); box-shadow: var(--shadow-v); }

    .sc-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .sc-ticker {
      font-family: var(--mono); font-size: 22px; font-weight: 700;
      color: #a5b4fc; line-height: 1; margin-bottom: 3px;
    }
    .sc-company { font-size: 12px; color: var(--t2); }
    .sc-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .sc-sector {
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      background: var(--indigo-dim); border: 1px solid var(--border-v);
      color: #a5b4fc; border-radius: 5px;
    }

    .sc-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 16px;
    }
    .sc-metric {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 10px 12px;
    }
    .sc-metric-label {
      font-size: 10px; font-weight: 700; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px;
    }
    .sc-metric-value {
      font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--t1);
    }

    .sc-targets {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
    }
    .sc-target {
      padding: 10px 14px; border-radius: var(--r-sm);
    }
    .sc-target-bull { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.15); }
    .sc-target-bear { background: var(--red-dim);   border: 1px solid rgba(244,63,94,0.15); }
    .sc-target-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 2px;
    }
    .sc-target-bull .sc-target-label { color: rgba(34,197,94,0.7); }
    .sc-target-bear .sc-target-label { color: rgba(244,63,94,0.7); }
    .sc-target-price { font-family: var(--mono); font-size: 18px; font-weight: 600; }
    .sc-target-bull .sc-target-price { color: var(--green); }
    .sc-target-bear .sc-target-price { color: var(--red); }

    .sc-risk-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .sc-risk-label { font-size: 11px; color: var(--t3); white-space: nowrap; }
    .sc-risk-track {
      flex: 1; height: 5px; background: var(--bg-surface);
      border-radius: 3px; overflow: hidden; border: 1px solid var(--border);
    }
    .sc-risk-fill { height: 100%; border-radius: 3px; }
    .sc-risk-score { font-family: var(--mono); font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }

    .sc-entry {
      display: grid; grid-template-columns: repeat(3, 1fr);
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); overflow: hidden;
    }
    .sc-entry-item { padding: 10px 12px; }
    .sc-entry-item + .sc-entry-item { border-left: 1px solid var(--border); }
    .sc-entry-key {
      font-size: 10px; font-weight: 700; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px;
    }
    .sc-entry-val { font-family: var(--mono); font-size: 12px; font-weight: 500; }
    .sc-entry-val.sky { color: var(--sky); }
    .sc-entry-val.red { color: var(--red); }
    .sc-entry-val.vi  { color: #a5b4fc; }

    /* ── PORTFOLIO ── */
    .portfolio-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      animation: up 0.5s 0.2s ease both;
    }
    .portfolio-table { width: 100%; border-collapse: collapse; }
    .portfolio-table th {
      padding: 12px 20px; font-size: 11px; font-weight: 700;
      color: var(--t3); text-transform: uppercase; letter-spacing: 0.08em;
      background: var(--bg-surface); border-bottom: 1px solid var(--border); text-align: left;
    }
    .portfolio-table td { padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .portfolio-table tr:last-child td { border-bottom: none; }
    .alloc-tier { font-family: var(--mono); font-size: 13px; font-weight: 600; }
    .alloc-vi   { color: #a5b4fc; }
    .alloc-sky  { color: var(--sky); }
    .alloc-red  { color: var(--red); }
    .ticker-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .ticker-chip {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      padding: 3px 10px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 5px; color: var(--t1);
    }
    .alloc-weight { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--t1); }
    .rationale-box {
      margin-top: 0; padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 13px; color: var(--t2); line-height: 1.7; font-style: italic;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 24px;
    }
    .footer-disclaimer { font-size: 11px; color: var(--t3); line-height: 1.6; max-width: 580px; }
    .footer-brand { text-align: right; flex-shrink: 0; }
    .footer-brand-name { font-size: 13px; font-weight: 700; color: var(--indigo); margin-bottom: 2px; }
    .footer-ts { font-family: var(--mono); font-size: 11px; color: var(--t3); }

    /* ── ANALYSIS PANEL ── */
    .sc-analysis {
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .sc-analysis-toggle {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; font-weight: 700; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer; user-select: none; margin-bottom: 0;
      transition: color 0.15s;
    }
    .sc-analysis-toggle:hover { color: var(--indigo); }
    .sc-analysis-toggle .toggle-icon {
      font-size: 10px; transition: transform 0.2s;
    }
    .sc-analysis-body {
      display: none; margin-top: 12px;
    }
    .sc-analysis-body.open { display: block; }
    .sc-analysis-row {
      display: grid; grid-template-columns: 110px 1fr;
      gap: 6px 14px; margin-bottom: 10px; align-items: baseline;
    }
    .sc-analysis-row:last-child { margin-bottom: 0; }
    .sc-analysis-key {
      font-size: 10px; font-weight: 700; color: var(--indigo);
      text-transform: uppercase; letter-spacing: 0.07em; padding-top: 2px;
    }
    .sc-analysis-val {
      font-size: 12px; color: var(--t2); line-height: 1.6;
    }

    /* ── ANIMATIONS ── */
    @keyframes up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .metrics-strip { grid-template-columns: repeat(3, 1fr); }
      .charts-row    { grid-template-columns: 1fr; }
      .cards-grid    { grid-template-columns: 1fr; }
    }
  </style>
</head>

/* ════════════════════════════
   HELPERS
════════════════════════════ */
const riskColor = r => r <= 4 ? 'var(--green)' : r <= 7 ? 'var(--amber)' : 'var(--red)';
const riskCls   = r => r <= 4 ? 'risk-lo' : r <= 7 ? 'risk-md' : 'risk-hi';
const moatCls   = m => ({ Strong:'moat-strong', Moderate:'moat-moderate', Weak:'moat-weak' }[m]);
const px = v => v >= 1 ? '$' + v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '$' + v.toFixed(2);
const avgRisk   = () => (D.stocks.reduce((s,x) => s + x.risk, 0) / D.stocks.length).toFixed(1);
const avgPE     = () => { const v = D.stocks.filter(s => s.pe !== 'N/M'); const a = v.reduce((s,x) => s + parseFloat(x.pe),0) / v.length; return a.toFixed(0)+'x'; };
const topSpread = () => [...D.stocks].sort((a,b) => (b.bull/b.bear) - (a.bull/a.bear))[0].ticker;
const maxUpside = () => { const s = [...D.stocks].sort((a,b) => (b.bull/b.bear)-(a.bull/a.bear))[0]; return '+' + (((s.bull/s.bear)-1)*100).toFixed(0)+'%'; };

  });
}

/* ════════════════════════════
   TABLE SORT
════════════════════════════ */
function initSort() {
  const tbl = document.getElementById('tbl');
  if (!tbl) return;
  let col=-1, asc=true;
  tbl.querySelectorAll('thead th').forEach((th,i) => {
    th.addEventListener('click', () => {
      if (col===i) asc=!asc; else { col=i; asc=true; }
      tbl.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted'));
      th.classList.add('sorted');
      const tb = tbl.querySelector('tbody');
      [...tb.rows].sort((a,b) => {
        const av = a.cells[i].textContent.replace(/[$,%x\/▲▼ ]/g,'').trim();
        const bv = b.cells[i].textContent.replace(/[$,%x\/▲▼ ]/g,'').trim();
        const an = parseFloat(av), bn = parseFloat(bv);
        const c = !isNaN(an)&&!isNaN(bn) ? an-bn : av.localeCompare(bv);
        return asc ? c : -c;
      }).forEach(r => tb.appendChild(r));
    });
  });
}

/* ════════════════════════════
   BOOT
════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('app').innerHTML =
    Topbar() +
    `<div class="page">` +
      Hero() +
      MetricsStrip() +
      Charts() +
      Table() +
      Cards() +
      Portfolio() +
      Footer() +
    `</div>`;
  initCharts();
  initSort();
});
</script>
